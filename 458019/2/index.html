<!DOCTYPE html>
<html lang="zh-Hant">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>貪吃蛇  施丞彥HTML 版</title>
	<style>
		:root {
			--bg: #f6f2ea;
			--panel: #1f2a44;
			--panel-2: #2f3f68;
			--text: #f9f6ef;
			--accent: #f2a541;
			--good: #58c27d;
			--danger: #e35d5d;
			--board: #1e3f32;
			--cell-a: #2e5c46;
			--cell-b: #28513f;
			--snake-head: #ffd166;
			--snake-body: #8bd68b;
			--food: #ff5d5d;
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			min-height: 100vh;
			font-family: "Microsoft JhengHei", "Segoe UI", sans-serif;
			color: var(--text);
			background:
				radial-gradient(circle at 10% 10%, #ffffff99 0 8%, transparent 8.5%),
				radial-gradient(circle at 92% 18%, #ffffff99 0 7%, transparent 7.5%),
				linear-gradient(140deg, #d8e9dc, #f6f2ea 45%, #e6dfd2);
			display: grid;
			place-items: center;
			padding: 20px;
		}

		.app {
			width: min(920px, 100%);
			display: grid;
			grid-template-columns: 320px 1fr;
			gap: 18px;
		}

		.panel {
			background: linear-gradient(170deg, var(--panel), var(--panel-2));
			border-radius: 16px;
			padding: 20px;
			box-shadow: 0 18px 30px rgba(0, 0, 0, 0.25);
		}

		.panel h1 {
			font-size: clamp(1.5rem, 2.6vw, 2rem);
			margin-bottom: 12px;
			letter-spacing: 0.04em;
		}

		.stats {
			display: grid;
			gap: 10px;
			margin: 14px 0;
		}

		.stat {
			background: rgba(255, 255, 255, 0.09);
			border-radius: 10px;
			padding: 10px 12px;
			display: flex;
			justify-content: space-between;
			font-weight: 700;
		}

		.controls {
			margin-top: 8px;
			font-size: 0.95rem;
			line-height: 1.6;
			opacity: 0.95;
		}

		.credit {
			margin-top: 12px;
			font-size: 0.9rem;
			opacity: 0.86;
		}

		button {
			width: 100%;
			margin-top: 12px;
			border: none;
			border-radius: 999px;
			padding: 11px 14px;
			font-size: 1rem;
			font-weight: 800;
			cursor: pointer;
			background: var(--accent);
			color: #2f2209;
			transition: transform 0.14s ease, filter 0.15s ease;
		}

		button:hover {
			transform: translateY(-1px);
			filter: brightness(1.04);
		}

		.dpad {
			margin-top: 14px;
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 8px;
			max-width: 220px;
		}

		.dpad-btn {
			margin-top: 0;
			padding: 10px;
			font-size: 1.2rem;
			line-height: 1;
			touch-action: none;
			user-select: none;
			-webkit-user-select: none;
		}

		.dpad-btn.empty {
			visibility: hidden;
			pointer-events: none;
		}

		.status {
			margin-top: 12px;
			min-height: 22px;
			font-weight: 700;
			color: #fff0d7;
		}

		.status.dead {
			color: #ffd1d1;
		}

		.game {
			background: #10221a;
			border-radius: 16px;
			padding: 14px;
			box-shadow: 0 20px 35px rgba(0, 0, 0, 0.24);
			display: grid;
			place-items: center;
		}

		canvas {
			width: min(100%, 560px);
			aspect-ratio: 1 / 1;
			border-radius: 12px;
			image-rendering: pixelated;
			background: var(--board);
			box-shadow: inset 0 0 0 3px rgba(255, 255, 255, 0.06);
		}

		@media (max-width: 860px) {
			.app {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>
<body>
	<main class="app">
		<section class="panel">
			<h1>貪吃蛇</h1>
			<div class="stats">
				<div class="stat"><span>分數</span><span id="score">0</span></div>
				<div class="stat"><span>最高分</span><span id="best">0</span></div>
				<div class="stat"><span>速度</span><span id="speed">6</span></div>
			</div>
			<div class="controls">
				<div>方向鍵或 WASD 控制移動</div>
				<div>空白鍵可暫停 / 繼續</div>
				<div>M 可切換音效</div>
			</div>
			<button id="restartBtn">重新開始</button>
			<button id="soundBtn">音效：開啟</button>
			<div class="dpad" aria-label="手機方向鍵">
				<button class="dpad-btn empty" aria-hidden="true" tabindex="-1">·</button>
				<button class="dpad-btn" data-dir="up" aria-label="上">↑</button>
				<button class="dpad-btn empty" aria-hidden="true" tabindex="-1">·</button>
				<button class="dpad-btn" data-dir="left" aria-label="左">←</button>
				<button class="dpad-btn empty" aria-hidden="true" tabindex="-1">·</button>
				<button class="dpad-btn" data-dir="right" aria-label="右">→</button>
				<button class="dpad-btn empty" aria-hidden="true" tabindex="-1">·</button>
				<button class="dpad-btn" data-dir="down" aria-label="下">↓</button>
				<button class="dpad-btn empty" aria-hidden="true" tabindex="-1">·</button>
			</div>
			<div class="credit">設計者：施丞彥</div>
			<div id="status" class="status">吃到紅點即可加分</div>
		</section>

		<section class="game" aria-label="遊戲區">
			<canvas id="board" width="600" height="600"></canvas>
		</section>
	</main>

	<script>
		const GRID = 20;
		const CELL = 600 / GRID;
		const BASE_SPEED = 6;
		const SPEED_STEP = 0.25;
		const BEST_KEY = "snake_best_v1";
		const DPAD_HOLD_INTERVAL = 90;
		const BGM_INTERVAL_MS = 260;

		const canvas = document.getElementById("board");
		const ctx = canvas.getContext("2d");
		const scoreEl = document.getElementById("score");
		const bestEl = document.getElementById("best");
		const speedEl = document.getElementById("speed");
		const statusEl = document.getElementById("status");
		const restartBtn = document.getElementById("restartBtn");
		const soundBtn = document.getElementById("soundBtn");
		const dpadButtons = document.querySelectorAll(".dpad-btn[data-dir]");

		let snake;
		let direction;
		let nextDirection;
		let food;
		let score;
		let best;
		let paused;
		let gameOver;
		let accumulator;
		let lastTime = 0;
		let soundEnabled = true;
		let audioCtx;
		let dpadHoldTimer = null;
		let bgmTimer = null;
		let bgmStep = 0;

		function ensureAudio() {
			if (!audioCtx) {
				audioCtx = new (window.AudioContext || window.webkitAudioContext)();
			}
			if (audioCtx.state === "suspended") {
				audioCtx.resume();
			}
		}

		function beep(freq, duration = 0.08, volume = 0.08, type = "sine") {
			if (!soundEnabled) return;
			ensureAudio();
			const now = audioCtx.currentTime;
			const osc = audioCtx.createOscillator();
			const gain = audioCtx.createGain();
			osc.type = type;
			osc.frequency.setValueAtTime(freq, now);
			gain.gain.setValueAtTime(0.0001, now);
			gain.gain.exponentialRampToValueAtTime(volume, now + 0.01);
			gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
			osc.connect(gain).connect(audioCtx.destination);
			osc.start(now);
			osc.stop(now + duration);
		}

		function playEatSound() {
			beep(700, 0.06, 0.07, "triangle");
			beep(980, 0.09, 0.06, "square");
		}

		function playCrashSound() {
			const notes = [
				{ f: 659.25, d: 0.2, v: 0.06, t: "triangle", w: 0 },
				{ f: 622.25, d: 0.2, v: 0.06, t: "triangle", w: 180 },
				{ f: 587.33, d: 0.24, v: 0.065, t: "triangle", w: 360 },
				{ f: 523.25, d: 0.24, v: 0.07, t: "triangle", w: 560 },
				{ f: 493.88, d: 0.22, v: 0.065, t: "triangle", w: 760 },
				{ f: 440.0, d: 0.34, v: 0.075, t: "triangle", w: 960 },
				{ f: 392.0, d: 0.42, v: 0.08, t: "sine", w: 1180 }
			];

			notes.forEach((note) => {
				setTimeout(() => {
					beep(note.f, note.d, note.v, note.t);
				}, note.w);
			});
		}

		function playPauseSound(isPaused) {
			if (isPaused) {
				beep(420, 0.08, 0.07, "triangle");
			} else {
				beep(540, 0.08, 0.07, "triangle");
			}
		}

		function playRestartSound() {
			beep(420, 0.07, 0.07, "triangle");
			beep(560, 0.08, 0.07, "triangle");
		}

		function playCanonBgmStep() {
			if (!soundEnabled || !audioCtx || paused || gameOver) return;

			const progression = [
				[261.63, 329.63, 392.0],
				[196.0, 246.94, 392.0],
				[220.0, 261.63, 329.63],
				[164.81, 220.0, 329.63],
				[174.61, 220.0, 349.23],
				[130.81, 174.61, 261.63],
				[146.83, 196.0, 293.66],
				[196.0, 246.94, 329.63]
			];

			const chord = progression[bgmStep % progression.length];
			const pick = bgmStep % 4;

			if (pick === 0) {
				beep(chord[0], 0.22, 0.032, "sine");
			} else if (pick === 1) {
				beep(chord[1], 0.2, 0.028, "triangle");
			} else if (pick === 2) {
				beep(chord[2], 0.24, 0.03, "triangle");
			} else {
				beep(chord[1] * 2, 0.16, 0.022, "sine");
			}

			bgmStep += 1;
		}

		function startBgm() {
			if (bgmTimer || !soundEnabled || !audioCtx || paused || gameOver) return;
			bgmTimer = setInterval(playCanonBgmStep, BGM_INTERVAL_MS);
		}

		function stopBgm() {
			if (bgmTimer) {
				clearInterval(bgmTimer);
				bgmTimer = null;
			}
		}

		function loadBest() {
			const raw = localStorage.getItem(BEST_KEY);
			const val = Number(raw);
			best = Number.isFinite(val) ? val : 0;
			bestEl.textContent = String(best);
		}

		function saveBest() {
			localStorage.setItem(BEST_KEY, String(best));
		}

		function randomCell() {
			return {
				x: Math.floor(Math.random() * GRID),
				y: Math.floor(Math.random() * GRID)
			};
		}

		function spawnFood() {
			let pos = randomCell();
			while (snake.some((s) => s.x === pos.x && s.y === pos.y)) {
				pos = randomCell();
			}
			food = pos;
		}

		function updateHud() {
			scoreEl.textContent = String(score);
			const speed = (BASE_SPEED + Math.floor(score / 3) * SPEED_STEP).toFixed(2);
			speedEl.textContent = speed;
			bestEl.textContent = String(best);
		}

		function setStatus(text, dead = false) {
			statusEl.textContent = text;
			statusEl.className = dead ? "status dead" : "status";
		}

		function resetGame() {
			stopBgm();
			snake = [
				{ x: 10, y: 10 },
				{ x: 9, y: 10 },
				{ x: 8, y: 10 }
			];
			direction = { x: 1, y: 0 };
			nextDirection = { x: 1, y: 0 };
			score = 0;
			paused = false;
			gameOver = false;
			accumulator = 0;
			bgmStep = 0;
			spawnFood();
			updateHud();
			setStatus("吃到紅點即可加分");
			startBgm();
		}

		function hitWall(head) {
			return head.x < 0 || head.y < 0 || head.x >= GRID || head.y >= GRID;
		}

		function hitSelf(head) {
			return snake.some((s) => s.x === head.x && s.y === head.y);
		}

		function step() {
			if (paused || gameOver) return;

			direction = nextDirection;
			const head = {
				x: snake[0].x + direction.x,
				y: snake[0].y + direction.y
			};

			if (hitWall(head) || hitSelf(head)) {
				gameOver = true;
				stopBgm();
				playCrashSound();
				setStatus("遊戲結束，按重新開始再玩一次", true);
				return;
			}

			snake.unshift(head);

			if (head.x === food.x && head.y === food.y) {
				score += 1;
				playEatSound();
				if (score > best) {
					best = score;
					saveBest();
				}
				spawnFood();
				setStatus("好球，繼續衝分");
			} else {
				snake.pop();
			}

			updateHud();
		}

		function drawGrid() {
			for (let y = 0; y < GRID; y += 1) {
				for (let x = 0; x < GRID; x += 1) {
					ctx.fillStyle = (x + y) % 2 === 0 ? "#2e5c46" : "#28513f";
					ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
				}
			}
		}

		function drawFood() {
			ctx.fillStyle = "#ff5d5d";
			ctx.beginPath();
			ctx.arc(
				food.x * CELL + CELL / 2,
				food.y * CELL + CELL / 2,
				CELL * 0.33,
				0,
				Math.PI * 2
			);
			ctx.fill();
		}

		function drawSnake() {
			snake.forEach((part, index) => {
				ctx.fillStyle = index === 0 ? "#ffd166" : "#8bd68b";
				ctx.fillRect(part.x * CELL + 1, part.y * CELL + 1, CELL - 2, CELL - 2);
			});
		}

		function draw() {
			drawGrid();
			drawFood();
			drawSnake();

			if (paused && !gameOver) {
				ctx.fillStyle = "rgba(0, 0, 0, 0.35)";
				ctx.fillRect(0, 0, canvas.width, canvas.height);
				ctx.fillStyle = "#ffffff";
				ctx.font = "bold 42px Microsoft JhengHei";
				ctx.textAlign = "center";
				ctx.fillText("暫停中", canvas.width / 2, canvas.height / 2);
			}
		}

		function gameLoop(timestamp) {
			const delta = (timestamp - lastTime) / 1000;
			lastTime = timestamp;

			const speed = BASE_SPEED + Math.floor(score / 3) * SPEED_STEP;
			const stepInterval = 1 / speed;
			accumulator += delta;

			while (accumulator >= stepInterval) {
				step();
				accumulator -= stepInterval;
			}

			draw();
			requestAnimationFrame(gameLoop);
		}

		function isOpposite(a, b) {
			return a.x + b.x === 0 && a.y + b.y === 0;
		}

		function handleDirection(newDir) {
			if (isOpposite(direction, newDir)) return;
			nextDirection = newDir;
		}

		function applyDirectionByName(dirName) {
			if (dirName === "up") handleDirection({ x: 0, y: -1 });
			if (dirName === "down") handleDirection({ x: 0, y: 1 });
			if (dirName === "left") handleDirection({ x: -1, y: 0 });
			if (dirName === "right") handleDirection({ x: 1, y: 0 });
		}

		function stopDpadHold() {
			if (dpadHoldTimer) {
				clearInterval(dpadHoldTimer);
				dpadHoldTimer = null;
			}
		}

		function startDpadHold(dirName, event) {
			event.preventDefault();
			ensureAudio();
			applyDirectionByName(dirName);
			stopDpadHold();
			dpadHoldTimer = setInterval(() => {
				applyDirectionByName(dirName);
			}, DPAD_HOLD_INTERVAL);
		}

		window.addEventListener("keydown", (event) => {
			const key = event.key.toLowerCase();
			if (["arrowup", "arrowdown", "arrowleft", "arrowright", "w", "a", "s", "d", " ", "m"].includes(key)) {
				ensureAudio();
			}
			if (["arrowup", "arrowdown", "arrowleft", "arrowright", "w", "a", "s", "d", " ", "m"].includes(key)) {
				event.preventDefault();
			}

			if (key === "m") {
				soundEnabled = !soundEnabled;
				soundBtn.textContent = soundEnabled ? "音效：開啟" : "音效：關閉";
				setStatus(soundEnabled ? "音效已開啟" : "音效已關閉");
				if (soundEnabled) {
					startBgm();
				} else {
					stopBgm();
				}
				return;
			}

			if (key === " " && !gameOver) {
				paused = !paused;
				playPauseSound(paused);
				setStatus(paused ? "已暫停，按空白鍵繼續" : "繼續遊戲");
				if (paused) {
					stopBgm();
				} else {
					startBgm();
				}
				return;
			}

			if (key === "arrowup" || key === "w") handleDirection({ x: 0, y: -1 });
			if (key === "arrowdown" || key === "s") handleDirection({ x: 0, y: 1 });
			if (key === "arrowleft" || key === "a") handleDirection({ x: -1, y: 0 });
			if (key === "arrowright" || key === "d") handleDirection({ x: 1, y: 0 });
		});

		restartBtn.addEventListener("click", () => {
			ensureAudio();
			playRestartSound();
			resetGame();
		});

		soundBtn.addEventListener("click", () => {
			ensureAudio();
			soundEnabled = !soundEnabled;
			soundBtn.textContent = soundEnabled ? "音效：開啟" : "音效：關閉";
			setStatus(soundEnabled ? "音效已開啟" : "音效已關閉");
			if (soundEnabled) {
				beep(600, 0.06, 0.06, "triangle");
				startBgm();
			} else {
				stopBgm();
			}
		});

		dpadButtons.forEach((btn) => {
			const moveOnce = (event) => {
				event.preventDefault();
				ensureAudio();
				applyDirectionByName(btn.dataset.dir);
			};
			btn.addEventListener("click", moveOnce);
			btn.addEventListener("pointerdown", (event) => startDpadHold(btn.dataset.dir, event));
			btn.addEventListener("pointerup", stopDpadHold);
			btn.addEventListener("pointercancel", stopDpadHold);
			btn.addEventListener("pointerleave", stopDpadHold);
		});

		loadBest();
		resetGame();
		requestAnimationFrame((ts) => {
			lastTime = ts;
			gameLoop(ts);
		});
	</script>
</body>
</html>
