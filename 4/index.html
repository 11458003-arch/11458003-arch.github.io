<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>資料夾 4 | Gemini 聊天機器人</title>
  <meta name="description" content="建立在資料夾 4 的 Gemini 2.5 Flash 聊天機器人。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #f5ead9;
      --bg-2: #cde5d7;
      --ink: #1d2a26;
      --muted: #4c6157;
      --panel: rgba(255, 255, 255, 0.82);
      --line: rgba(29, 42, 38, 0.16);
      --accent: #d0632f;
      --accent-2: #2f6b54;
      --danger: #a72727;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans TC", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 10% 10%, #fff8ef 0, transparent 35%),
                  radial-gradient(circle at 85% 20%, #d8efe2 0, transparent 32%),
                  linear-gradient(150deg, var(--bg-1), var(--bg-2));
      padding: 24px;
    }

    .wrap {
      width: min(860px, 100%);
      margin: 0 auto;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: clamp(20px, 4vw, 34px);
      background: var(--panel);
      box-shadow: 0 12px 36px rgba(29, 42, 38, 0.14);
      backdrop-filter: blur(2px);
      animation: rise 0.8s ease;
    }

    .tag {
      display: inline-block;
      padding: 6px 11px;
      border-radius: 999px;
      border: 1px solid rgba(47, 107, 84, 0.34);
      color: var(--accent-2);
      font-weight: 700;
      font-size: 0.86rem;
      background: rgba(255, 255, 255, 0.74);
      letter-spacing: 0.03em;
    }

    h1 {
      margin: 14px 0 8px;
      font-family: "Playfair Display", serif;
      font-size: clamp(1.9rem, 5vw, 2.8rem);
      line-height: 1.1;
    }

    .lead {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.7;
    }

    .designer {
      margin: 0 0 10px;
      font-weight: 700;
      color: var(--accent-2);
      letter-spacing: 0.02em;
    }

    .hint {
      margin: 0 0 18px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(47, 107, 84, 0.25);
      background: rgba(255, 255, 255, 0.7);
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.96rem;
    }

    .key-note {
      margin: -6px 0 6px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .form {
      display: grid;
      gap: 14px;
    }

    label {
      font-weight: 700;
      font-size: 0.95rem;
    }

    input,
    textarea {
      width: 100%;
      margin-top: 6px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 11px 12px;
      font: inherit;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.86);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      border: 0;
      cursor: pointer;
      border-radius: 999px;
      padding: 10px 18px;
      font: inherit;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), #d48742);
      box-shadow: 0 8px 16px rgba(208, 99, 47, 0.26);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .btn:hover,
    .btn:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 12px 18px rgba(29, 42, 38, 0.22);
    }

    .btn.secondary {
      color: var(--ink);
      background: linear-gradient(135deg, #f3f0e8, #d8e7dc);
      box-shadow: 0 8px 16px rgba(47, 107, 84, 0.18);
    }

    .status {
      font-size: 0.95rem;
      color: var(--muted);
    }

    .status.error {
      color: var(--danger);
      font-weight: 700;
    }

    .response-box {
      margin-top: 4px;
      border: 1px solid var(--line);
      border-radius: 14px;
      min-height: 200px;
      padding: 14px;
      line-height: 1.7;
      background: rgba(255, 255, 255, 0.86);
      display: grid;
      gap: 12px;
      align-content: start;
      overflow-y: auto;
    }

    .chat-row {
      display: flex;
    }

    .chat-row.question {
      justify-content: flex-end;
    }

    .chat-row.answer {
      justify-content: flex-start;
    }

    .chat-bubble {
      max-width: min(78%, 560px);
      border-radius: 14px;
      border: 1px solid rgba(29, 42, 38, 0.14);
      background: #ffffff;
      padding: 10px 12px;
      box-shadow: 0 5px 12px rgba(29, 42, 38, 0.08);
    }

    .chat-bubble.question {
      background: rgba(208, 99, 47, 0.12);
      border-color: rgba(208, 99, 47, 0.26);
    }

    .chat-label {
      margin: 0 0 4px;
      font-size: 0.82rem;
      color: var(--accent-2);
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .chat-content {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .chat-placeholder {
      margin: 0;
      color: var(--muted);
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .panel {
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <span class="tag">FOLDER 4</span>
      <h1>Gemini 聊天機器人</h1>
      <p class="designer">設計者：林宜君</p>
      <p class="lead">建議模型：Gemini 2.5 Flash。可輸入 API Key、輸入問題並顯示回覆。</p>
      <p class="hint">
        此頁面已固定並鎖定 API 金鑰，載入後會自動帶入並使用。<br />
        送出問題後，下方對話框會以「一問一答」模式顯示。
      </p>
      <p class="key-note">金鑰欄位已隱藏，不會顯示在頁面上。</p>

      <form class="form" id="chat-form">
        <input id="api-key" name="apiKey" type="hidden" value="AIzaSyDRzF7iTgdiEaB9XXNoYBHqNTPNhJ_dgXU" />

        <label for="question">
          輸入問題的欄位
          <textarea id="question" name="question" placeholder="請輸入你的問題" required></textarea>
        </label>

        <div class="actions">
          <button type="submit" class="btn" id="send-btn">送出訊息</button>
          <span id="status" class="status" role="status" aria-live="polite"></span>
        </div>

        <label for="response">顯示回覆視窗</label>
        <div id="response" class="response-box" aria-live="polite">
          <p class="chat-placeholder">尚未送出問題。</p>
        </div>
      </form>
    </section>
  </main>

  <script>
    const MODELS = ["gemini-2.0-flash-lite", "gemini-2.0-flash", "gemini-2.5-flash"];
    const LOCKED_API_KEYS = [
      "AIzaSyDRzF7iTgdiEaB9XXNoYBHqNTPNhJ_dgXU",
      "AIzaSyBsMFuzxLF5LRtnQ0CLTDUkrnQJWVm3jFg",
      "AIzaSyDwVmXSvu12E3ZbKNR5-Wh9eezYGDou4uA",
      "AIzaSyAKbfdM6GU2u0kmWXh32gO76Ifu0_93_4k"
    ];
    const MAX_QUESTION_LENGTH = 500;
    const GENERATION_CONFIG = {
      maxOutputTokens: 256,
      temperature: 0.5,
      topP: 0.9
    };

    const form = document.getElementById("chat-form");
    const apiKeyInput = document.getElementById("api-key");
    const questionInput = document.getElementById("question");
    const sendBtn = document.getElementById("send-btn");
    const statusEl = document.getElementById("status");
    const responseEl = document.getElementById("response");

    function isLikelyGeminiKey(key) {
      return /^AIza[0-9A-Za-z_-]{35}$/.test(String(key || "").trim());
    }

    const ACTIVE_API_KEYS = LOCKED_API_KEYS.filter(isLikelyGeminiKey);

    function setStatus(message, isError) {
      statusEl.textContent = message;
      statusEl.classList.toggle("error", Boolean(isError));
    }

    function createChatRow(type, label, text) {
      const row = document.createElement("div");
      row.className = "chat-row " + type;

      const bubble = document.createElement("div");
      bubble.className = "chat-bubble " + type;

      const title = document.createElement("p");
      title.className = "chat-label";
      title.textContent = label;

      const content = document.createElement("p");
      content.className = "chat-content";
      content.textContent = text;

      bubble.appendChild(title);
      bubble.appendChild(content);
      row.appendChild(bubble);
      return row;
    }

    function renderQA(question, answer) {
      responseEl.innerHTML = "";

      if (!question && !answer) {
        const placeholder = document.createElement("p");
        placeholder.className = "chat-placeholder";
        placeholder.textContent = "尚未送出問題。";
        responseEl.appendChild(placeholder);
        return;
      }

      responseEl.appendChild(createChatRow("question", "問題", question || "-"));
      responseEl.appendChild(createChatRow("answer", "回答", answer || "尚未收到回覆。"));
    }

    function pickResponseText(data) {
      const candidates = data && data.candidates;
      if (!Array.isArray(candidates) || candidates.length === 0) {
        return "模型沒有回覆內容。";
      }

      const parts = candidates[0] && candidates[0].content && candidates[0].content.parts;
      if (!Array.isArray(parts)) {
        return "模型回覆格式無法解析。";
      }

      const texts = parts
        .map(function (part) { return part && part.text; })
        .filter(function (text) { return typeof text === "string" && text.trim(); });

      return texts.length ? texts.join("\n\n") : "模型沒有產生可顯示文字。";
    }

    function isRetryable(statusCode, message) {
      const text = String(message || "").toLowerCase();
      return statusCode === 401 || statusCode === 403 || statusCode === 404 || statusCode === 429 || statusCode === 503 ||
        text.includes("leaked") || text.includes("invalid api key") || text.includes("high demand") || text.includes("resource exhausted");
    }

    async function requestOnce(apiKey, modelName, question) {
      const endpoint = "https://generativelanguage.googleapis.com/v1beta/models/" + modelName + ":generateContent?key=" + encodeURIComponent(apiKey);
      const payload = {
        contents: [{ parts: [{ text: question }] }],
        generationConfig: GENERATION_CONFIG
      };

      const response = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const data = await response.json().catch(function () { return {}; });
      if (!response.ok) {
        const message = (data && data.error && data.error.message) || ("HTTP " + response.status);
        const error = new Error(message);
        error.statusCode = response.status;
        throw error;
      }

      return data;
    }

    async function askGemini(question) {
      let lastError = null;

      if (ACTIVE_API_KEYS.length === 0) {
        throw new Error("沒有可用的 API key，請更新金鑰。");
      }

      for (let modelIndex = 0; modelIndex < MODELS.length; modelIndex += 1) {
        const model = MODELS[modelIndex];

        for (let keyIndex = 0; keyIndex < ACTIVE_API_KEYS.length; keyIndex += 1) {
          const apiKey = ACTIVE_API_KEYS[keyIndex];
          try {
            const data = await requestOnce(apiKey, model, question);
            apiKeyInput.value = apiKey;
            return { data: data, model: model, keyIndex: keyIndex };
          } catch (error) {
            lastError = error;
            if (!isRetryable(error.statusCode, error.message)) {
              throw error;
            }
          }
        }
      }

      throw lastError || new Error("目前無法回覆，請稍後再試。");
    }

    function initializeApiKey() {
      apiKeyInput.value = ACTIVE_API_KEYS[0] || "";
      renderQA("", "");
    }

    initializeApiKey();

    form.addEventListener("submit", async function (event) {
      event.preventDefault();

      let question = questionInput.value.trim();
      if (!question) {
        setStatus("請輸入問題。", true);
        questionInput.focus();
        return;
      }

      if (question.length > MAX_QUESTION_LENGTH) {
        question = question.slice(0, MAX_QUESTION_LENGTH);
      }

      sendBtn.disabled = true;
      setStatus("送出中...");
      renderQA(question, "等待回覆中...");

      try {
        const result = await askGemini(question);
        const answer = pickResponseText(result.data);
        renderQA(question, answer);
        setStatus("完成（" + result.model + "）。", false);
      } catch (error) {
        renderQA(question, "目前無法取得回覆，請稍後再試。");
        if (String((error && error.message) || "").toLowerCase().includes("api key not valid")) {
          setStatus("全部金鑰都無效，請更換新 API key。", true);
        } else {
          setStatus("發生錯誤：" + ((error && error.message) || "未知錯誤"), true);
        }
      } finally {
        sendBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
